name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') }}

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu (unit/integration/physics)"
            os: ubuntu-latest
            python-version: "3.11"
            kind: "main"
            artifact_name: "coverage-ubuntu-unit-integration-physics"

          - name: "macOS (unit/integration/physics)"
            os: macos-latest
            python-version: "3.11"
            kind: "main"
            artifact_name: "coverage-macos-unit-integration-physics"

          - name: "Doctests"
            os: ubuntu-latest
            python-version: "3.11"
            kind: "doctest"
            artifact_name: "coverage-ubuntu-doctests"

    env:
      NKDSL_EXPERIMENTAL: "1"
      NETKET_EXPERIMENTAL: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-tags: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Main tests
        if: ${{ matrix.kind == 'main' }}
        run: |
          pytest --cov=nkdsl --cov-append --cov-report=xml --cov-fail-under=85

      - name: Doc tests
        if: ${{ matrix.kind == 'doctest' }}
        run: |
          pytest --doctest-continue-on-failure --doctest-modules src/nkdsl --cov=nkdsl --cov-append --cov-report=xml --cov-fail-under=0

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: coverage.xml
