name: Publish to PyPi

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nkdsl/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - run: |
          # actions/checkout may create a local tag ref pointing to the commit sha.
          # If the remote tag is annotated, fetching tags would otherwise fail with:
          # "would clobber existing tag".
          git tag -d "${{ github.event.release.tag_name }}" 2>/dev/null || true
          git fetch --prune --unshallow --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build
          pip install -U build twine 

      - name: Build
        run: |
          python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
