[pytest]
minversion = 8.0
testpaths =
    tests
addopts =
    -ra
    --strict-config
    --strict-markers
    --cov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85
markers =
    unit: fast unit-level tests for DSL/IR/compiler primitives
    integration: integration tests across compiler + runtime boundaries
    physics: physics-focused correctness tests against NetKet references
    slow: longer-running tests (for example full VMC driver parity)
filterwarnings =
    ignore::UserWarning
